<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard intérimaires — DSN</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:       #1a2f5a;
      --navy-light: #243f7a;
      --white:      #ffffff;
      --gray-50:    #f8fafc;
      --gray-100:   #f1f5f9;
      --gray-200:   #e2e8f0;
      --gray-400:   #94a3b8;
      --gray-600:   #475569;
      --gray-800:   #1e293b;
      --green:      #22c55e;
      --green-bg:   #f0fdf4;
      --orange:     #f97316;
      --orange-bg:  #fff7ed;
      --red:        #ef4444;
      --red-bg:     #fef2f2;
      --radius:     8px;
      --shadow:     0 1px 3px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.08);
      --shadow-lg:  0 10px 25px rgba(0,0,0,.18);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--gray-50);
      color: var(--gray-800);
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────── */
    .header {
      background: var(--navy);
      color: var(--white);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo { display: flex; align-items: center; gap: 12px; }

    .logo-mark {
      width: 40px; height: 40px;
      background: var(--white);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 13px;
      color: var(--navy);
      letter-spacing: -.5px;
      flex-shrink: 0;
    }

    .logo-title { font-size: 16px; font-weight: 700; letter-spacing: .3px; }
    .logo-sub   { font-size: 11px; opacity: .65; letter-spacing: .6px; text-transform: uppercase; margin-top: 1px; }

    .header-meta { font-size: 12px; opacity: .6; }

    /* ── Layout ─────────────────────────────────────── */
    .main { max-width: 1400px; margin: 0 auto; padding: 24px; }

    /* ── Stat cards ─────────────────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 20px 24px;
      box-shadow: var(--shadow);
      border-left: 4px solid var(--navy);
    }
    .stat-card.card-alertes  { border-left-color: var(--orange); }
    .stat-card.card-attente  { border-left-color: var(--gray-400); }

    .stat-value {
      font-size: 38px; font-weight: 700; color: var(--navy); line-height: 1;
    }
    .stat-card.card-alertes .stat-value { color: var(--orange); }
    .stat-card.card-attente .stat-value { color: var(--gray-600); }

    .stat-label { font-size: 12px; color: var(--gray-600); margin-top: 6px; }

    /* ── Toolbar ────────────────────────────────────── */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-wrap: wrap; margin-bottom: 14px;
    }

    .section-title { font-size: 15px; font-weight: 600; }

    .toolbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    .ctrl {
      padding: 8px 12px;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      font-size: 13px; outline: none;
      background: var(--white); color: var(--gray-800);
    }
    .ctrl:focus { border-color: var(--navy); box-shadow: 0 0 0 2px rgba(26,47,90,.1); }
    input.ctrl { width: 200px; }
    select.ctrl { cursor: pointer; min-width: 160px; }

    /* ── Table ──────────────────────────────────────── */
    .table-wrapper {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow-x: auto;
    }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }

    thead { background: var(--gray-50); border-bottom: 2px solid var(--gray-200); }
    th {
      padding: 11px 16px; text-align: left;
      font-weight: 600; color: var(--gray-600);
      font-size: 11px; text-transform: uppercase; letter-spacing: .5px;
      white-space: nowrap;
    }

    td { padding: 13px 16px; border-bottom: 1px solid var(--gray-100); }

    tbody tr { cursor: pointer; transition: background .1s; }
    tbody tr:hover { background: #f0f4ff; }
    tbody tr:last-child td { border-bottom: none; }

    .name-cell { font-weight: 500; }

    .num { font-variant-numeric: tabular-nums; }

    .ecart-neg { color: var(--red);   font-weight: 600; }
    .ecart-pos { color: #16a34a; }
    .ecart-ok  { color: var(--gray-600); }

    /* ── Badges ─────────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 600; letter-spacing: .3px;
      text-transform: uppercase; white-space: nowrap;
    }
    .badge::before {
      content: ''; width: 6px; height: 6px;
      border-radius: 50%; background: currentColor;
      flex-shrink: 0;
    }
    .badge-ok       { background: var(--green-bg);  color: #16a34a; }
    .badge-attente  { background: var(--gray-100);  color: var(--gray-600); }
    .badge-attention{ background: var(--orange-bg); color: #c2570b; }
    .badge-critique { background: var(--red-bg);    color: #dc2626; }
    .badge-mois     { background: #dbeafe; color: #1d4ed8; }

    /* ── Empty / loading ────────────────────────────── */
    .placeholder { text-align: center; padding: 60px 20px; color: var(--gray-400); font-size: 14px; }
    .placeholder strong { display: block; font-size: 16px; margin-bottom: 6px; color: var(--gray-600); }

    /* ── Modal ──────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 24px;
      opacity: 0; pointer-events: none;
      transition: opacity .18s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--white);
      border-radius: 12px; box-shadow: var(--shadow-lg);
      width: 100%; max-width: 700px; max-height: 88vh;
      overflow-y: auto;
      transform: translateY(10px);
      transition: transform .18s;
    }
    .overlay.open .modal { transform: translateY(0); }

    .modal-header {
      padding: 20px 24px; border-bottom: 1px solid var(--gray-200);
      display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
      position: sticky; top: 0; background: var(--white); z-index: 1;
    }
    .modal-title  { font-size: 18px; font-weight: 700; color: var(--navy); }
    .modal-sub    { font-size: 13px; color: var(--gray-600); margin-top: 3px; }
    .modal-close  {
      background: none; border: none; cursor: pointer;
      color: var(--gray-400); font-size: 22px; line-height: 1; flex-shrink: 0;
    }
    .modal-close:hover { color: var(--gray-800); }

    .modal-body   { padding: 24px; }
    .modal-footer {
      padding: 16px 24px; border-top: 1px solid var(--gray-200);
      display: flex; justify-content: flex-end; gap: 8px;
    }

    .msec { margin-bottom: 24px; }
    .msec:last-child { margin-bottom: 0; }

    .msec-title {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .5px; color: var(--gray-400); margin-bottom: 12px;
    }

    /* Day grid */
    .days-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px;
    }

    .day-card {
      background: var(--gray-50); border: 1px solid var(--gray-200);
      border-radius: var(--radius); padding: 12px;
    }
    .day-card.no-work { opacity: .38; }

    .day-name  { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--gray-400); margin-bottom: 5px; }
    .day-hours { font-size: 22px; font-weight: 700; color: var(--navy); }
    .day-meta  { font-size: 11px; color: var(--gray-600); margin-top: 3px; }

    /* Totaux */
    .totaux { display: flex; gap: 12px; flex-wrap: wrap; }
    .total-item {
      background: var(--gray-50); border-radius: var(--radius);
      padding: 12px 16px; flex: 1; min-width: 110px;
    }
    .total-label { font-size: 10px; font-weight: 600; text-transform: uppercase; color: var(--gray-400); margin-bottom: 4px; }
    .total-value { font-size: 24px; font-weight: 700; color: var(--navy); }

    /* Detail table */
    .dtable { width: 100%; border-collapse: collapse; font-size: 13px; }
    .dtable td { padding: 8px 12px; border-bottom: 1px solid var(--gray-100); }
    .dtable td:first-child { color: var(--gray-600); font-weight: 500; width: 55%; }
    .dtable tr:last-child td { border-bottom: none; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px; border-radius: var(--radius);
      font-size: 13px; font-weight: 600; cursor: pointer;
      border: none; text-decoration: none; transition: opacity .15s;
    }
    .btn:hover { opacity: .82; }
    .btn-primary { background: var(--navy); color: var(--white); }
    .btn-ghost   { background: var(--gray-100); color: var(--gray-800); }
    .btn-danger  { background: var(--red-bg);   color: var(--red); }

    /* ── PDFs section ───────────────────────────────── */
    .pdfs-section { margin-top: 32px; }

    /* ── Responsive ─────────────────────────────────── */
    @media (max-width: 900px) {
      .stats { grid-template-columns: 1fr 1fr; }
      .stats .stat-card:last-child { grid-column: span 2; }
    }
    @media (max-width: 640px) {
      .header { padding: 0 16px; }
      .main   { padding: 14px; }
      .stats  { grid-template-columns: 1fr; }
      .stats .stat-card:last-child { grid-column: auto; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .toolbar-right { flex-direction: column; }
      input.ctrl, select.ctrl { width: 100%; }
      th:nth-child(5), td:nth-child(5),
      th:nth-child(6), td:nth-child(6),
      th:nth-child(7), td:nth-child(7) { display: none; }
      .days-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
  <script src="/app/layout.js" defer></script>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-mark">DSN</div>
    <div>
      <div class="logo-title">DSN Transports</div>
      <div class="logo-sub">Dashboard RH — Intérimaires</div>
    </div>
  </div>
  <div class="header-meta" id="last-update"></div>
</header>

<main class="main">

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-value" id="stat-feuilles">—</div>
      <div class="stat-label">Feuilles du mois en cours</div>
    </div>
    <div class="stat-card card-alertes">
      <div class="stat-value" id="stat-alertes">—</div>
      <div class="stat-label">Alertes actives (ATTENTION + CRITIQUE)</div>
    </div>
    <div class="stat-card card-attente">
      <div class="stat-value" id="stat-attente">—</div>
      <div class="stat-label">Fiches en attente</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="section-title">Contrôles intérimaires</div>
    <div class="toolbar-right">
      <input  type="text" class="ctrl" id="search"          placeholder="Rechercher un nom…">
      <select              class="ctrl" id="semaine-filter">
        <option value="">Toutes les semaines</option>
      </select>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrapper">
    <div id="table-container" class="placeholder">Chargement…</div>
  </div>

  <!-- Feuilles d'heures -->
  <div class="pdfs-section" style="margin-top:24px">
    <div class="toolbar">
      <div class="section-title">Feuilles d'heures</div>
      <div class="toolbar-right">
        <a href="/api/pdfs/zip" class="btn btn-ghost">&#128230; Télécharger tout (ZIP)</a>
      </div>
    </div>
    <div class="table-wrapper">
      <div id="feuilles-container" class="placeholder">Chargement…</div>
    </div>
  </div>

</main>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-sub"   id="modal-sub"></div>
      </div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body"   id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
'use strict';

const JOURS  = ['lundi','mardi','mercredi','jeudi','vendredi','samedi','dimanche'];
const JLABEL = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];

let data = { feuilles: [], facture: [], mapping: [], controles: [] };
let filterSemaine = '';
let filterSearch  = '';

/* ── Fetch ─────────────────────────────────────────── */
async function load() {
  try {
    const r = await fetch('/api/dashboard');
    if (!r.ok) throw new Error('Serveur : HTTP ' + r.status);
    data = await r.json();
    render();
    document.getElementById('last-update').textContent =
      'Actualisé à ' + new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  } catch (e) {
    document.getElementById('table-container').innerHTML =
      `<div class="placeholder"><strong>Erreur de chargement</strong>${e.message}</div>`;
  }
}

/* ── Render ────────────────────────────────────────── */
function render() {
  populateFilter();
  renderStats();
  renderTable();
  renderFeuilles();
}

function populateFilter() {
  const sel = document.getElementById('semaine-filter');
  const prev = sel.value;
  const semaines = [...new Set(data.controles.map(r => r.semaine).filter(Boolean))].sort().reverse();
  sel.innerHTML = '<option value="">Toutes les semaines</option>';
  semaines.forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = 'Semaine ' + s;
    if (s === prev) o.selected = true;
    sel.appendChild(o);
  });
  if (!prev && semaines.length) {
    sel.value = semaines[0];
    filterSemaine = semaines[0];
  }
}

function renderStats() {
  const now = new Date();
  const feuillesMois = data.feuilles.filter(f => {
    if (!f.horodatage) return false;
    const d = new Date(f.horodatage);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  });
  document.getElementById('stat-feuilles').textContent = feuillesMois.length;
  document.getElementById('stat-alertes').textContent  =
    data.controles.filter(r => r.niveau_alerte === 'ATTENTION' || r.niveau_alerte === 'CRITIQUE').length;
  document.getElementById('stat-attente').textContent  =
    data.controles.filter(r => r.niveau_alerte === 'EN ATTENTE').length;
}

function parseSem(s) {
  const str = String(s || '');
  const m = str.match(/\d{4}[.\-](\d{1,2})/) || str.match(/[Ss](\d{1,2})/) || str.match(/(\d{1,2})/);
  return m ? m[1].padStart(2, '0') : str;
}

function filtered() {
  const q = filterSearch.toLowerCase();
  return data.controles.filter(r => {
    if (filterSemaine && parseSem(r.semaine) !== parseSem(filterSemaine)) return false;
    if (q && !(r.nom||'').toLowerCase().includes(q) && !(r.prenom||'').toLowerCase().includes(q)) return false;
    return true;
  });
}

function renderTable() {
  const rows = filtered();
  const container = document.getElementById('table-container');

  if (!rows.length) {
    container.innerHTML = '<div class="placeholder"><strong>Aucune donnée</strong>Aucun contrôle pour cette sélection.</div>';
    return;
  }

  const tbl = document.createElement('table');
  tbl.innerHTML = `
    <thead><tr>
      <th>Intérimaire</th><th>Semaine</th>
      <th>H. signées</th><th>H. facturées</th><th>Écart facture</th>
      <th>H. GPS</th><th>Écart GPS</th><th>Alerte</th>
    </tr></thead>`;

  const tbody = document.createElement('tbody');
  rows.forEach(r => {
    const tr = document.createElement('tr');
    tr.dataset.nom    = r.nom    || '';
    tr.dataset.prenom = r.prenom || '';
    tr.dataset.semaine= r.semaine|| '';
    tr.innerHTML = `
      <td class="name-cell">${esc(r.prenom)} ${esc(r.nom)}</td>
      <td>${esc(r.semaine)}</td>
      <td class="num">${fmtH(r.heures_signees)}</td>
      <td class="num">${fmtH(r.heures_facturees)}</td>
      <td>${fmtEcart(r.ecart_facture)}</td>
      <td class="num">${fmtH(r.heures_vehicule)}</td>
      <td>${fmtEcart(r.ecart_mapping)}</td>
      <td>${badge(r.niveau_alerte)}</td>`;
    tbody.appendChild(tr);
  });

  tbody.addEventListener('click', e => {
    const tr = e.target.closest('tr');
    if (tr) openModal(tr.dataset.nom, tr.dataset.prenom, tr.dataset.semaine);
  });

  tbl.appendChild(tbody);
  container.innerHTML = '';
  container.appendChild(tbl);
}

/* ── Helpers ───────────────────────────────────────── */
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtH(v) {
  const n = parseFloat(v);
  return isNaN(n) ? '—' : `<span class="num">${n.toFixed(2)} h</span>`;
}

function fmtEcart(v) {
  const n = parseFloat(v);
  if (isNaN(n)) return '—';
  const cls = n < -0.5 ? 'ecart-neg' : n > 0.5 ? 'ecart-pos' : 'ecart-ok';
  const sign = n > 0 ? '+' : '';
  return `<span class="num ${cls}">${sign}${n.toFixed(2)} h</span>`;
}

function badge(niveau) {
  const map = { 'OK':'badge-ok','EN ATTENTE':'badge-attente','ATTENTION':'badge-attention','CRITIQUE':'badge-critique' };
  return `<span class="badge ${map[niveau]||'badge-attente'}">${esc(niveau||'—')}</span>`;
}

/* ── Modal ─────────────────────────────────────────── */
function openModal(nom, prenom, semaine) {
  const ctrl = data.controles.find(r => r.nom === nom && r.prenom === prenom && String(r.semaine) === String(semaine));
  const feuille = data.feuilles.find(r => r.nom === nom && r.prenom === prenom && String(r.semaine) === String(semaine));

  document.getElementById('modal-title').textContent = `${prenom} ${nom}`;
  document.getElementById('modal-sub').textContent   =
    `Semaine ${semaine}` + (ctrl && ctrl.statut_facture ? ` · ${ctrl.statut_facture}` : '');

  let body = '';

  if (feuille) {
    /* Heures par jour */
    body += `<div class="msec">
      <div class="msec-title">Heures par jour</div>
      <div class="days-grid">`;
    JOURS.forEach((j, i) => {
      const h  = parseFloat(feuille[`h_${j}`]) || 0;
      const pan= feuille[`panier_${j}`];
      const sit= feuille[`site_${j}`] || '';
      const meta = [pan ? 'Panier : ' + pan : '', sit].filter(Boolean).join(' · ');
      body += `<div class="day-card${h === 0 ? ' no-work' : ''}">
        <div class="day-name">${JLABEL[i]}</div>
        <div class="day-hours">${h > 0 ? h.toFixed(2)+' h' : '—'}</div>
        <div class="day-meta">${esc(meta)}</div>
      </div>`;
    });
    body += `</div></div>`;

    /* Totaux */
    body += `<div class="msec">
      <div class="msec-title">Totaux</div>
      <div class="totaux">
        <div class="total-item">
          <div class="total-label">Heures totales</div>
          <div class="total-value">${fmtH(feuille.total_heures)}</div>
        </div>
        <div class="total-item">
          <div class="total-label">Paniers</div>
          <div class="total-value">${esc(String(feuille.total_paniers||'0'))}</div>
        </div>
        <div class="total-item">
          <div class="total-label">Agence</div>
          <div class="total-value" style="font-size:16px;margin-top:4px">${esc(feuille.agence||'—')}</div>
        </div>
      </div>
    </div>`;
  }

  if (ctrl) {
    body += `<div class="msec">
      <div class="msec-title">Contrôles</div>
      <table class="dtable">
        <tr><td>Heures signées</td><td>${fmtH(ctrl.heures_signees)}</td></tr>
        <tr><td>Heures facturées</td><td>${fmtH(ctrl.heures_facturees)}</td></tr>
        <tr><td>Écart facture</td><td>${fmtEcart(ctrl.ecart_facture)}</td></tr>
        <tr><td>Statut facture</td><td>${esc(ctrl.statut_facture||'—')}</td></tr>
        <tr><td>Heures GPS (véhicule)</td><td>${fmtH(ctrl.heures_vehicule)}</td></tr>
        <tr><td>Véhicule actif</td><td>${esc(ctrl.vehicule_actif||'—')}</td></tr>
        <tr><td>Écart mapping GPS</td><td>${fmtEcart(ctrl.ecart_mapping)}</td></tr>
        <tr><td>Statut mapping</td><td>${esc(ctrl.statut_mapping||'—')}</td></tr>
        <tr><td>Niveau d'alerte</td><td>${badge(ctrl.niveau_alerte)}</td></tr>
        ${ctrl.detail ? `<tr><td>Détail</td><td style="color:var(--gray-600)">${esc(ctrl.detail)}</td></tr>` : ''}
      </table>
    </div>`;
  }

  if (!feuille && !ctrl) {
    body = '<p style="text-align:center;color:var(--gray-400);padding:32px">Aucun détail disponible.</p>';
  }

  document.getElementById('modal-body').innerHTML = body;

  /* Footer */
  let footer = '<button class="btn btn-ghost" id="btn-close-modal">Fermer</button>';
  if (feuille && feuille.lien_pdf) {
    const filename = String(feuille.lien_pdf).replace(/^.*[\\/]/, '');
    footer += `<a href="/pdfs/${encodeURIComponent(filename)}" target="_blank" class="btn btn-primary">&#128196; Voir le PDF</a>`;
  }
  document.getElementById('modal-footer').innerHTML = footer;
  document.getElementById('btn-close-modal').addEventListener('click', closeModal);

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

/* ── Feuilles ──────────────────────────────────────── */
function renderFeuilles() {
  const container = document.getElementById('feuilles-container');
  const feuilles = (data.feuilles || []).slice().sort((a, b) => {
    const sa = String(a.semaine || ''), sb = String(b.semaine || '');
    return sb.localeCompare(sa) || (a.nom||'').localeCompare(b.nom||'');
  });
  if (!feuilles.length) {
    container.innerHTML = '<div class="placeholder"><strong>Aucune feuille</strong>Aucune donnée disponible.</div>';
    return;
  }
  const tbl = document.createElement('table');
  tbl.innerHTML = `<thead><tr>
    <th>Intérimaire</th><th>Semaine</th><th>Mois</th>
    <th>Total H</th><th>Paniers</th><th>Statut</th><th></th>
  </tr></thead>`;
  const tbody = document.createElement('tbody');
  feuilles.forEach(f => {
    const mois = String(f.mois_paie || '');
    const moisBadge = mois ? `<span class="badge badge-mois">${esc(mois)}</span>` : '—';
    const pdfHref = f.lien_pdf
      ? '/pdfs/' + encodeURIComponent(String(f.lien_pdf).replace(/^.*[\\/]/, ''))
      : '';
    const pdfLink = pdfHref
      ? `<a href="${pdfHref}" target="_blank" class="btn btn-ghost" style="padding:6px 10px;font-size:12px">&#128196; PDF</a>`
      : '';
    const tr = document.createElement('tr');
    tr.dataset.nom    = f.nom    || '';
    tr.dataset.prenom = f.prenom || '';
    tr.dataset.semaine= String(f.semaine || '');
    tr.dataset.mois   = mois;
    tr.innerHTML = `
      <td class="name-cell">${esc(f.prenom||'')} ${esc(f.nom||'')}</td>
      <td>${esc(String(f.semaine||''))}</td>
      <td>${moisBadge}</td>
      <td class="num">${fmtH(f.total_heures)}</td>
      <td class="num">${String(f.total_paniers||0)}</td>
      <td>${esc(f.statut||'')}</td>
      <td style="text-align:right;white-space:nowrap">${pdfLink}<button data-action="delete" class="btn btn-danger" style="padding:6px 10px;font-size:14px;margin-left:4px" title="Supprimer cette feuille">&#128465;</button></td>`;
    tbody.appendChild(tr);
  });
  tbody.addEventListener('click', async e => {
    const btn = e.target.closest('[data-action="delete"]');
    if (!btn) return;
    const tr = btn.closest('tr');
    const { nom, prenom, semaine, mois } = tr.dataset;
    const label = `${prenom} ${nom} — sem. ${semaine}${mois ? ' / mois ' + mois : ''}`;
    if (!confirm(`Supprimer la feuille de ${label} ?\n\nLe PDF associé sera également supprimé.`)) return;
    btn.disabled = true;
    btn.innerHTML = '…';
    try {
      const r = await fetch('/api/feuille', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nom, prenom, semaine, mois_paie: mois })
      });
      if (!r.ok) { const j = await r.json().catch(() => ({})); throw new Error(j.error || 'HTTP ' + r.status); }
      await load();
    } catch (err) {
      alert('Erreur lors de la suppression : ' + err.message);
      btn.disabled = false;
      btn.innerHTML = '&#128465;';
    }
  });
  tbl.appendChild(tbody);
  container.innerHTML = '';
  container.appendChild(tbl);
}

/* ── Events ────────────────────────────────────────── */
document.getElementById('semaine-filter').addEventListener('change', e => {
  filterSemaine = e.target.value;
  renderTable();
});

document.getElementById('search').addEventListener('input', e => {
  filterSearch = e.target.value;
  renderTable();
});

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});

document.getElementById('modal-close').addEventListener('click', closeModal);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

/* ── Boot ──────────────────────────────────────────── */
load();
setInterval(load, 60_000);
</script>
</body>
</html>
